<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Clipvault</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=content_paste">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="titlebar">
      <div id="titlebar-left">
        <img src="/icons/appIcon.png" id="logo" alt="">
        <span id="title">Clipvault</span>
      </div>
      <div id="controls">
        <button class="ctrl-btn minimize-btn" onclick="Neutralino.window.minimize()" title="Minimize">
          <svg width="10" height="2" viewBox="0 0 10 2"><rect width="10" height="1.5" rx="0.75" fill="currentColor"/></svg>
        </button>
        <button class="ctrl-btn close-btn" onclick="Neutralino.window.hide()" title="Close">
          <svg width="10" height="10" viewBox="0 0 10 10">
            <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="main-content">
      <div id="search-bar">
        <svg id="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search clips..." autocomplete="off" spellcheck="false"/>
        <span id="clip-count">0 items</span>
      </div>

      <div id="clip-list"></div>

      <div id="statusbar">
        <span id="info"></span>
        <span id="hint">Click to copy · ESC to hide</span>
      </div>
    </div>
    <script src="/js/neutralino.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
